<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>JoyCon WAV Player</title>

<script type="module">
import { JoyCon } from "https://cdn.jsdelivr.net/npm/joy-con-webhid@0.11.0/+esm";

let joycons = [];

async function connectJoycon(){
    const jc = await JoyCon.connectJoyCon();
    joycons.push(jc);
    status.innerText = "Joy-Con接続: " + joycons.length;
}

async function playWav(file){

    const audioCtx = new AudioContext();

    const buffer = await file.arrayBuffer();
    const audio = await audioCtx.decodeAudioData(buffer);

    const data = audio.getChannelData(0);

    const sampleRate = audio.sampleRate;

    const targetRate = 200; 
    const step = Math.floor(sampleRate / targetRate);

    let i = 0;

    function tick(){

        if(i >= data.length){
            joycons.forEach(j=>j.rumble(0,0,0,0));
            status.innerText = "再生終了";
            return;
        }

        const sample = data[i];

        const amp = Math.min(1,Math.abs(sample)*2);

        joycons.forEach(j=>{
            j.rumble(
                160,
                amp,
                320,
                amp
            );
        });

        i += step;

        setTimeout(tick,1000/targetRate);
    }

    status.innerText = "再生中";

    tick();
}

window.onload=()=>{
    document.getElementById("connect").onclick=connectJoycon;

    document.getElementById("file").onchange=(e)=>{
        const f=e.target.files[0];
        if(f) playWav(f);
    };
}
</script>
</head>

<body style="font-family:sans-serif;text-align:center;margin-top:50px">

<h1>JoyCon WAV Player</h1>

<button id="connect">Joy-Con接続</button>

<br><br>

<input type="file" id="file" accept=".wav">

<p id="status">待機中</p>

</body>
</html>
